<div class="farmasys-app">
  <header class="topbar">
    <div class="logo-wrapper" (click)="mostrarCatalogo = false" style="cursor: pointer">
      <svg class="logo-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path
          d="M12 2V6M12 18V22M6 12H2M22 12H18M12 6C8.68629 6 6 8.68629 6 12C6 15.3137 8.68629 18 12 18C15.3137 18 18 15.3137 18 12C18 8.68629 15.3137 6 12 6Z"
          stroke="#1A535C"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
        <path
          d="M12 8V16M8 12H16"
          stroke="#4ECDC4"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
      <span class="logo-text">FarmaSys</span>
    </div>
    <div
      class="breadcrumb-text ms-4"
      *ngIf="mostrarCatalogo"
      style="color: #6c757d; font-size: 0.95rem"
    >
      <span>Inventario > </span><span style="color: #000; font-weight: 500">Buscar Catálogo</span>
    </div>
  </header>
  <main class="main-content">
    <div *ngIf="!mostrarCatalogo">
      <div class="header-section">
        <h1>Bienvenido a FarmaSys Cloud</h1>
        <p>Selecciona un módulo.</p>
      </div>
      <div class="modules-grid mb-5">
        <div class="module-card" (click)="mostrarCatalogo = true" style="border-color: #008778">
          <div class="icon-container">
            <img src="icons/tag.svg" alt="Icono" class="custom-icon" />
          </div>
          <div class="text-container">
            <h3>Gestionar Catálogo</h3>
            <p>Mantenimiento de la base de datos maestra de artículos.</p>
          </div>
        </div>
      </div>
    </div>
    <div *ngIf="mostrarCatalogo">
      <div class="mt-2">
        <router-outlet></router-outlet>
      </div>
      <div class="mt-5 mb-4">
        <button class="btn btn-outline-volver" (click)="mostrarCatalogo = false">Volver</button>
      </div>
    </div>
  </main>
</div>
